<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="t d">
  <title id="t">Basic wound care supplies</title>
  <desc id="d">Illustration of gauze swabs, gauze roll, and elastic bandage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    :root{--brand:#0ea67a;--ink:#0f172a;--muted:#64748b;--stroke:rgba(15,23,42,.14)}
    .card{fill:url(#bg);stroke:var(--stroke);stroke-width:2}
    .label{font:800 18px ui-sans-serif,system-ui;fill:var(--ink)}
    .small{font:600 12px ui-sans-serif,system-ui;fill:var(--muted)}
    .pill{fill:rgba(14,166,122,.10);stroke:rgba(14,166,122,.25);stroke-width:2}
  </style>

  <rect x="60" y="50" width="680" height="500" rx="28" class="card" filter="url(#shadow)"/>
  <rect x="92" y="86" width="180" height="44" rx="22" class="pill"/>
  <text x="112" y="115" class="small">WOUND CARE • BASIC</text>

  <!-- Gauze swabs stack -->
  <rect x="150" y="210" width="240" height="170" rx="22" fill="#fff" stroke="rgba(15,23,42,.14)" stroke-width="2"/>
  <rect x="175" y="235" width="190" height="28" rx="14" fill="rgba(14,166,122,.10)"/>
  <rect x="175" y="275" width="190" height="14" rx="7" fill="rgba(15,23,42,.10)"/>
  <rect x="175" y="300" width="160" height="14" rx="7" fill="rgba(15,23,42,.08)"/>

  <!-- Gauze roll -->
  <ellipse cx="520" cy="290" rx="120" ry="70" fill="#fff" stroke="rgba(15,23,42,.14)" stroke-width="2"/>
  <ellipse cx="520" cy="290" rx="68" ry="40" fill="rgba(246,248,251,1)" stroke="rgba(15,23,42,.10)" stroke-width="2"/>
  <ellipse cx="520" cy="290" rx="30" ry="18" fill="rgba(14,166,122,.12)" stroke="rgba(14,166,122,.25)" stroke-width="2"/>

  <!-- Elastic bandage -->
  <rect x="300" y="395" width="360" height="70" rx="22" fill="#fff" stroke="rgba(15,23,42,.14)" stroke-width="2"/>
  <path d="M320 420h320" stroke="rgba(14,166,122,.35)" stroke-width="10" stroke-linecap="round"/>
  <path d="M320 445h240" stroke="rgba(15,23,42,.12)" stroke-width="10" stroke-linecap="round"/>

  <text x="150" y="470" class="label">Basic Consumables</text>
  <text x="150" y="495" class="small">Gauze swabs • Rolls • Pads • Elastic/crepe bandages</text>
</svg>
