<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="t d">
  <title id="t">Advanced wound care dressings</title>
  <desc id="d">Illustration of advanced wound dressing pack and sterile pads.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#0e8e32"/>
      <stop offset="1" stop-color="#03521e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    :root{--brand:#0e8e32;--ink:#0f172a;--muted:#64748b;--stroke:rgba(15,23,42,.14)}
    .card{fill:url(#bg);stroke:var(--stroke);stroke-width:2}
    .label{font:700 18px ui-sans-serif,system-ui;fill:var(--ink)}
    .small{font:600 12px ui-sans-serif,system-ui;fill:var(--muted)}
    .line{stroke:rgba(15,23,42,.18);stroke-width:2;fill:none}
    .pill{fill:rgba(14,142,50,.10);stroke:rgba(14,142,50,.25);stroke-width:2}
  </style>

  <rect x="60" y="50" width="680" height="500" rx="28" class="card" filter="url(#shadow)"/>
  <rect x="92" y="86" width="200" height="44" rx="22" class="pill"/>
  <text x="112" y="115" class="small">WOUND CARE • ADVANCED</text>

  <rect x="140" y="170" width="300" height="260" rx="22" fill="#fff" stroke="rgba(15,23,42,.14)" stroke-width="2"/>
  <rect x="140" y="170" width="300" height="72" rx="22" fill="rgba(14,142,50,.10)"/>
  <rect x="170" y="200" width="160" height="10" rx="5" fill="rgba(15,23,42,.18)"/>
  <rect x="170" y="222" width="210" height="10" rx="5" fill="rgba(15,23,42,.10)"/>
  <rect x="170" y="250" width="240" height="150" rx="16" fill="rgba(246,248,251,1)" stroke="rgba(15,23,42,.10)" stroke-width="2"/>

  <rect x="470" y="210" width="210" height="210" rx="26" fill="#ffffff" stroke="rgba(15,23,42,.14)" stroke-width="2"/>
  <rect x="505" y="245" width="140" height="140" rx="18" fill="rgba(14,142,50,.10)" stroke="rgba(14,142,50,.25)" stroke-width="2"/>
  <path d="M525 315h100" stroke="url(#brandGrad)" stroke-width="8" stroke-linecap="round"/>
  <path d="M575 265v100" stroke="url(#brandGrad)" stroke-width="8" stroke-linecap="round"/>

  <text x="140" y="470" class="label">Advanced Dressings</text>
  <text x="140" y="495" class="small">Foam • Hydrocolloid • Film • Sterile packs</text>
</svg>