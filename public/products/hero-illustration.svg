<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="t d">
  <title id="t">Zomorod medical supplies illustration</title>
  <desc id="d">A clean illustration of key supply categories: wound care, PPE, and baby care.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="rgba(14,142,50,.22)"/>
      <stop offset="1" stop-color="rgba(14,142,50,.04)"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="70" y="70" width="760" height="560" rx="42" fill="rgba(255,255,255,.04)" stroke="rgba(255,255,255,.10)" stroke-width="2"/>
  <circle cx="250" cy="260" r="150" fill="url(#g)"/>
  <circle cx="650" cy="320" r="170" fill="url(#g)"/>

  <!-- Box -->
  <g filter="url(#s)">
    <rect x="190" y="360" width="260" height="190" rx="26" fill="#ffffff" opacity="0.92"/>
    <rect x="190" y="360" width="260" height="60" rx="26" fill="rgba(14,142,50,.14)"/>
    <rect x="230" y="400" width="180" height="12" rx="6" fill="rgba(15,23,42,.16)"/>
    <rect x="230" y="425" width="130" height="12" rx="6" fill="rgba(15,23,42,.10)"/>
  </g>

  <!-- Mask -->
  <g filter="url(#s)">
    <rect x="520" y="210" width="260" height="150" rx="28" fill="#ffffff" opacity="0.92"/>
    <rect x="520" y="210" width="260" height="50" rx="28" fill="rgba(14,142,50,.14)"/>
    <path d="M545 260h210" stroke="rgba(15,23,42,.12)" stroke-width="10" stroke-linecap="round"/>
    <path d="M545 295h210" stroke="rgba(15,23,42,.10)" stroke-width="10" stroke-linecap="round"/>
    <path d="M545 330h210" stroke="rgba(15,23,42,.08)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Bottle -->
  <g filter="url(#s)">
    <rect x="360" y="150" width="180" height="250" rx="60" fill="#ffffff" opacity="0.92"/>
    <rect x="390" y="175" width="120" height="200" rx="44" fill="rgba(14,142,50,.14)" stroke="rgba(14,142,50,.28)" stroke-width="2"/>
    <rect x="392" y="120" width="116" height="60" rx="22" fill="#ffffff" opacity="0.92"/>
    <path d="M405 140h90" stroke="rgba(14,142,50,.55)" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Plus sign -->
  <g opacity="0.9">
    <rect x="130" y="160" width="18" height="70" rx="9" fill="rgba(14,142,50,.65)"/>
    <rect x="104" y="186" width="70" height="18" rx="9" fill="rgba(14,142,50,.65)"/>
  </g>
</svg>