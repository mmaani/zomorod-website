<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="t d">
  <title id="t">Surgical masks Type IIR</title>
  <desc id="d">Illustration of a medical mask with ear loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f8fb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <style>
    :root{--brand:#0e8e32;--ink:#0f172a;--muted:#64748b;--stroke:rgba(15,23,42,.14)}
    .card{fill:url(#bg);stroke:var(--stroke);stroke-width:2}
    .label{font:800 18px ui-sans-serif,system-ui;fill:var(--ink)}
    .small{font:600 12px ui-sans-serif,system-ui;fill:var(--muted)}
    .pill{fill:rgba(14,142,50,.10);stroke:rgba(14,142,50,.25);stroke-width:2}
  </style>

  <rect x="60" y="50" width="680" height="500" rx="28" class="card" filter="url(#shadow)"/>
  <rect x="92" y="86" width="190" height="44" rx="22" class="pill"/>
  <text x="112" y="115" class="small">PPE • MASKS</text>

  <path d="M220 300c-70 0-100 70-70 120" fill="none" stroke="rgba(15,23,42,.18)" stroke-width="10" stroke-linecap="round"/>
  <path d="M580 300c70 0 100 70 70 120" fill="none" stroke="rgba(15,23,42,.18)" stroke-width="10" stroke-linecap="round"/>

  <rect x="230" y="220" width="340" height="200" rx="28" fill="#fff" stroke="rgba(15,23,42,.16)" stroke-width="2"/>
  <rect x="230" y="220" width="340" height="70" rx="28" fill="rgba(14,142,50,.10)"/>
  <path d="M260 290h280" stroke="rgba(15,23,42,.14)" stroke-width="10" stroke-linecap="round"/>
  <path d="M260 330h280" stroke="rgba(15,23,42,.12)" stroke-width="10" stroke-linecap="round"/>
  <path d="M260 370h280" stroke="rgba(15,23,42,.10)" stroke-width="10" stroke-linecap="round"/>

  <rect x="320" y="252" width="160" height="12" rx="6" fill="rgba(15,23,42,.18)"/>

  <text x="140" y="470" class="label">Type IIR Surgical Masks</text>
  <text x="140" y="495" class="small">Ear loop / head loop • Colors to match glove line + black</text>
</svg>